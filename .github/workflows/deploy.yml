name: Flask app

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login hacia GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.PRIMER1_TOKEN}}

    - name: Construir la imagen de Docker
      run: docker build -t ghcr.io/tonyj0711/ejercicio3:1.0.0 .

    - name: Publicar la imagen
      run: docker push ghcr.io/tonyj0711/ejercicio3:1.0.0